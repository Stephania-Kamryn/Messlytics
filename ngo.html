<!DOCTYPE html>
<html>

<head>
    <title>NGO Food Alerts</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logo {
            font-family: 'Anton', sans-serif;
            letter-spacing: 2px;
            font-size: 26px;
        }

        .background-blurngo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background-image: url("Food donation.png");
            background-size: cover;
            background-position: center;

            filter: blur(8px);
            opacity: 0.25;

            z-index: -1;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
</head>

<body>
    <div class="background-blurngo"></div>

    <nav>
        <div class="nav-logo">
            <img src="favicon.png" alt="Messlytics Logo">
            <h2 class="logo">Messlytics</h2>
        </div>

        <ul>
            <li><a href="mess entry.html">Mess Entry</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="ngo.html">NGO Alerts</a></li>
            <li><a href="student poll.html">Student Poll</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <div class="container">

        <h2>Food Pickup Alert</h2>

        <div class="ngo-card">

            <p><b>Food Available:</b> <span id="foodAvailable"></span> kg</p>

            <p><b>Meal:</b> <span id="mealType"></span></p>

            <p><b>Location:</b> <span id="foodLocation"></span></p>

            <p><b>Status:</b> <span id="pickupStatus"></span></p>

            <button id="pickupBtn">Mark as Picked Up</button>

        </div>

    </div>


    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <script src="firebase.js"></script>



    <script src="ngo.js"></script>

</body>

</html>
